  </defs>
  <rect width="1584" height="396" fill="url(#bg)"/>
  <rect x="0" y="388" width="1584" height="8" fill="url(#accent)" opacity="0.85"/>
  <!-- Safe zone: avoid left 420px (company logo overlap) -->
  <text x="460" y="118" fill="#94a3b8" font-family="system-ui,Segoe UI,sans-serif" font-size="22" letter-spacing="5">AESS TECHNOLOGIES</text>
  <text x="460" y="198" fill="#f8fafc" font-family="system-ui,Segoe UI,sans-serif" font-size="64" font-weight="700">Spectra</text>
  <text x="460" y="252" fill="#cbd5e1" font-family="system-ui,Segoe UI,sans-serif" font-size="26">Test real-time operator UIs</text>
  <text x="460" y="292" fill="#94a3b8" font-family="system-ui,Segoe UI,sans-serif" font-size="20">YAML + Browser + Socket + Vision</text>
  <rect x="460" y="314" width="380" height="44" rx="22" fill="url(#accent)"/>
  <text x="650" y="343" fill="#0f172a" font-family="system-ui,Segoe UI,sans-serif" font-size="18" font-weight="700" text-anchor="middle">www.aesstechnologies.com/spectra</text>
