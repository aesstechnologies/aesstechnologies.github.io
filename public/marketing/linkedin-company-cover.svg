  <text x="1220" y="136" fill="#e2e8f0" font-family="ui-monospace,monospace" font-size="18">screen.assert</text>
  <text x="1220" y="190" fill="#cbd5e1" font-family="system-ui,Segoe UI,sans-serif" font-size="20">One suite</text>
  <text x="1220" y="222" fill="#cbd5e1" font-family="system-ui,Segoe UI,sans-serif" font-size="20">One CI gate</text>
  <text x="1220" y="280" fill="#64748b" font-family="system-ui,Segoe UI,sans-serif" font-size="16">30-day free trial</text>
